<!doctype html>

<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Carte d'activité — Christophe Goubet</title>
<style>
  :root {
    --cg-olive: #98AF24;
    --cg-olive-soft: #b8c95a;
    --cg-olive-deep: #6f810e;
    --pretto-green: #0C806E;
    --pretto-green-soft: #2ea291;
    --marketing: #d68a3a;
    --marketing-soft: #e8b070;
    --recrut: #6b7fb5;
    --recrut-soft: #8fa0c8;
    --cream: #FAF6F2;
    --cream-2: #f0e9df;
    --ink: #1a1a1a;
    --ink-soft: #4a4a4a;
    --muted: #8a8275;
    --danger: #b34a3a;
    --danger-soft: #d8847a;
    --warn: #c89642;
    --ok: #4a8a4a;
    --shadow: 0 2px 12px rgba(0,0,0,.06);
    --shadow-hover: 0 10px 30px rgba(0,0,0,.12);
    --radius: 18px;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--cream); color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
  body { min-height: 100vh; }

  header.page {
    padding: 32px 48px 22px; border-bottom: 1px solid var(--cream-2);
    display: flex; align-items: flex-end; justify-content: space-between; gap: 24px; flex-wrap: wrap;
  }
  header.page h1 { margin: 0; font-size: 30px; font-weight: 700; letter-spacing: -.5px; }
  header.page h1 span.accent { color: var(--cg-olive); }
  header.page .meta { font-size: 13px; color: var(--muted); margin-top: 4px; }

  .toolbar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .toolbar select, .toolbar input[type=search] {
    padding: 9px 13px; border: 1px solid var(--cream-2); border-radius: 10px;
    background: white; font-size: 13px; color: var(--ink); font-family: inherit;
  }
  .toolbar input[type=search] { min-width: 220px; }
  .toolbar .btn {
    padding: 9px 15px; border: 1px solid var(--cg-olive); border-radius: 10px;
    background: var(--cg-olive); color: white; font-size: 13px; cursor: pointer; font-family: inherit;
  }
  .toolbar .btn:hover { background: var(--cg-olive-deep); border-color: var(--cg-olive-deep); }
  .toolbar .btn.ghost { background: white; color: var(--cg-olive-deep); }

  main { padding: 28px 48px 80px; max-width: 1400px; margin: 0 auto; }

  /* ----- Stats ribbon (small, above axes) ----- */
  .stats {
    display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 28px;
  }
  .stat {
    background: white; border-radius: 12px; padding: 12px 14px;
    box-shadow: var(--shadow); border-left: 3px solid var(--cg-olive);
  }
  .stat .label { font-size: 10px; text-transform: uppercase; letter-spacing: .8px; color: var(--muted); }
  .stat .value { font-size: 22px; font-weight: 700; margin-top: 2px; }
  .stat .sub { font-size: 11px; color: var(--ink-soft); margin-top: 1px; }

  /* ----- 4 main axes grid ----- */
  .axes {
    display: grid; grid-template-columns: 1fr 1fr; gap: 22px;
  }
  .axis {
    background: white; border-radius: var(--radius);
    box-shadow: var(--shadow); cursor: pointer;
    transition: box-shadow .25s, transform .25s;
    overflow: hidden; position: relative;
    border: 2px solid transparent;
  }
  .axis:hover { box-shadow: var(--shadow-hover); transform: translateY(-2px); }
  .axis.open { grid-column: 1 / -1; transform: none; box-shadow: var(--shadow-hover); cursor: default; }
  .axis.open:hover { transform: none; }

  .axis-head {
    padding: 28px 30px;
    display: flex; align-items: center; gap: 22px;
    position: relative;
  }
  .axis-icon {
    width: 72px; height: 72px; border-radius: 18px;
    display: flex; align-items: center; justify-content: center;
    font-size: 36px; flex-shrink: 0;
    background: var(--cream);
  }
  .axis.rd          .axis-icon { background: rgba(152, 175, 36, .14); color: var(--cg-olive-deep); }
  .axis.ventes      .axis-icon { background: rgba(12, 128, 110, .12); color: var(--pretto-green); }
  .axis.marketing   .axis-icon { background: rgba(214, 138, 58, .14); color: #a06424; }
  .axis.recrutement .axis-icon { background: rgba(107, 127, 181, .14); color: #44558a; }
  .axis.decide      .axis-icon { background: rgba(179, 74, 58, .12); color: var(--danger); }

  .axis.rd          { border-color: rgba(152, 175, 36, .25); }
  .axis.ventes      { border-color: rgba(12, 128, 110, .22); }
  .axis.marketing   { border-color: rgba(214, 138, 58, .25); }
  .axis.recrutement { border-color: rgba(107, 127, 181, .25); }
  .axis.decide      { border-color: rgba(179, 74, 58, .22); }

  .axis-info { flex: 1; min-width: 0; }
  .axis-info h2 { margin: 0; font-size: 24px; font-weight: 700; letter-spacing: -.3px; }
  .axis-info .sub { font-size: 13px; color: var(--muted); margin-top: 4px; }

  .axis-stats {
    display: flex; gap: 18px; margin-top: 14px; align-items: center;
  }
  .axis-stat { font-size: 12px; color: var(--ink-soft); }
  .axis-stat strong { font-size: 17px; color: var(--ink); display: block; line-height: 1.2; font-weight: 700; }
  .axis-progress {
    flex: 1; height: 8px; background: var(--cream-2); border-radius: 4px; overflow: hidden;
    min-width: 80px; margin-left: 4px;
  }
  .axis-progress > span { display: block; height: 100%; border-radius: 4px; transition: width .4s ease; }
  .axis.rd          .axis-progress > span { background: var(--cg-olive); }
  .axis.ventes      .axis-progress > span { background: var(--pretto-green); }
  .axis.marketing   .axis-progress > span { background: var(--marketing); }
  .axis.recrutement .axis-progress > span { background: var(--recrut); }
  .axis.decide      .axis-progress > span { background: var(--danger); }

  .chevron {
    width: 36px; height: 36px; border-radius: 50%; background: var(--cream);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; color: var(--ink-soft); flex-shrink: 0;
    transition: transform .25s, background .25s;
  }
  .axis.open .chevron { transform: rotate(180deg); background: var(--cg-olive); color: white; }

  .axis-body {
    max-height: 0; overflow: hidden; transition: max-height .35s ease;
    background: linear-gradient(to bottom, rgba(0,0,0,0), rgba(0,0,0,.02));
  }
  .axis.open .axis-body { max-height: 5000px; }
  .axis-body-inner { padding: 6px 30px 30px; }

  .projects { display: flex; flex-direction: column; gap: 10px; }
  .project {
    display: grid; grid-template-columns: 1fr auto; gap: 4px 14px;
    padding: 14px 16px; border-radius: 12px; background: var(--cream); cursor: pointer;
    transition: background .15s, transform .15s, box-shadow .15s;
    border: 1px solid transparent;
  }
  .project:hover { background: white; box-shadow: var(--shadow); border-color: var(--cream-2); }
  .project .name { font-size: 15px; font-weight: 600; }
  .project .next { font-size: 12px; color: var(--ink-soft); grid-column: 1 / -1; }
  .project .next::before { content: "→ "; color: var(--cg-olive); font-weight: 700; }
  .project .bar {
    grid-column: 1 / -1; height: 6px; background: var(--cream-2); border-radius: 3px; overflow: hidden; margin-top: 6px;
  }
  .project .bar > span { display: block; height: 100%; background: var(--cg-olive); border-radius: 3px; }
  .project .pct { font-size: 13px; color: var(--ink-soft); font-variant-numeric: tabular-nums; font-weight: 600; }
  .project .tags { display: flex; gap: 5px; flex-wrap: wrap; grid-column: 1 / -1; margin-top: 6px; }
  .tag {
    font-size: 10px; padding: 2px 8px; border-radius: 10px; background: white;
    border: 1px solid var(--cream-2); color: var(--ink-soft); text-transform: uppercase; letter-spacing: .4px;
  }
  .tag.zombie { background: #fdecea; color: var(--danger); border-color: #f5c6c0; }
  .tag.hot    { background: #fff4dc; color: #8a6210; border-color: #f0d999; }
  .tag.done   { background: #e7f2e7; color: var(--ok); border-color: #c2dfc2; }
  .tag.blocked{ background: #efeef5; color: #5a5a82; border-color: #d6d4e2; }

  .axis.ventes      .project .bar > span { background: var(--pretto-green); }
  .axis.marketing   .project .bar > span { background: var(--marketing); }
  .axis.recrutement .project .bar > span { background: var(--recrut); }
  .axis.decide      .project .bar > span { background: var(--danger); }

  /* Décide section : full width, smaller header */
  .axis.decide { grid-column: 1 / -1; }
  .axis.decide .axis-head { padding: 22px 30px; }
  .axis.decide .axis-icon { width: 56px; height: 56px; font-size: 28px; border-radius: 14px; }
  .axis.decide .axis-info h2 { font-size: 19px; }

  /* Modal */
  .overlay {
    position: fixed; inset: 0; background: rgba(20,18,14,.5); display: none;
    align-items: center; justify-content: center; padding: 20px; z-index: 100;
  }
  .overlay.open { display: flex; }
  .modal {
    background: white; border-radius: var(--radius); padding: 30px 32px;
    max-width: 640px; width: 100%; max-height: 85vh; overflow-y: auto;
    box-shadow: 0 24px 60px rgba(0,0,0,.3);
  }
  .modal h3 { margin: 0 0 4px; font-size: 24px; letter-spacing: -.3px; }
  .modal .axis-pill {
    display: inline-block; font-size: 11px; padding: 4px 11px; border-radius: 12px;
    background: var(--cream); color: var(--ink-soft); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 16px; font-weight: 600;
  }
  .modal .row { display: grid; grid-template-columns: 130px 1fr; gap: 10px 18px; padding: 12px 0; border-top: 1px solid var(--cream-2); font-size: 14px; }
  .modal .row:first-of-type { border-top: none; }
  .modal .row .key { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .8px; padding-top: 2px; font-weight: 600; }
  .modal .row .val { color: var(--ink); line-height: 1.55; }
  .modal .close { float: right; background: none; border: none; font-size: 26px; cursor: pointer; color: var(--muted); padding: 0; line-height: 1; }
  .modal .close:hover { color: var(--ink); }
  .modal a { color: var(--cg-olive-deep); }

  /* ===== Wizard "Par quoi je commence ?" ===== */
  .wiz-overlay {
    position: fixed; inset: 0; background: rgba(20,18,14,.65); display: none;
    align-items: center; justify-content: center; padding: 24px; z-index: 200;
    backdrop-filter: blur(4px);
  }
  .wiz-overlay.open { display: flex; }
  .wiz-card {
    background: white; border-radius: var(--radius); padding: 36px 40px;
    max-width: 680px; width: 100%; max-height: 90vh; overflow-y: auto;
    box-shadow: 0 30px 80px rgba(0,0,0,.35);
  }
  .wiz-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
  .wiz-step { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
  .wiz-close { background: none; border: none; font-size: 28px; cursor: pointer; color: var(--muted); padding: 0; line-height: 1; }
  .wiz-close:hover { color: var(--ink); }

  .wiz-progress { height: 4px; background: var(--cream-2); border-radius: 2px; overflow: hidden; margin-bottom: 28px; }
  .wiz-progress > span { display: block; height: 100%; background: var(--cg-olive); border-radius: 2px; transition: width .3s ease; }

  .wiz-question { font-size: 24px; font-weight: 700; letter-spacing: -.3px; margin-bottom: 8px; line-height: 1.3; }
  .wiz-sub { font-size: 13px; color: var(--muted); margin-bottom: 24px; }

  .wiz-options { display: flex; flex-direction: column; gap: 10px; }
  .wiz-option {
    text-align: left; padding: 16px 18px; border-radius: 12px; border: 2px solid var(--cream-2);
    background: var(--cream); cursor: pointer; font-family: inherit; font-size: 15px; color: var(--ink);
    transition: border-color .15s, background .15s, transform .1s;
    line-height: 1.4;
  }
  .wiz-option:hover { border-color: var(--cg-olive); background: white; transform: translateY(-1px); }
  .wiz-option.selected { border-color: var(--cg-olive); background: rgba(152,175,36,.08); }

  .wiz-nav { display: flex; justify-content: space-between; align-items: center; margin-top: 28px; gap: 12px; }
  .wiz-btn {
    padding: 10px 22px; border: 1px solid var(--cg-olive); border-radius: 10px;
    background: var(--cg-olive); color: white; font-size: 14px; cursor: pointer; font-family: inherit; font-weight: 600;
  }
  .wiz-btn:hover { background: var(--cg-olive-deep); border-color: var(--cg-olive-deep); }
  .wiz-btn:disabled { background: var(--cream-2); border-color: var(--cream-2); color: var(--muted); cursor: not-allowed; }
  .wiz-btn.ghost { background: white; color: var(--ink-soft); border-color: var(--cream-2); }
  .wiz-btn.ghost:hover { color: var(--ink); border-color: var(--ink-soft); }

  /* Results */
  .wiz-results h2 { margin: 0 0 8px; font-size: 26px; letter-spacing: -.3px; }
  .wiz-results .wiz-sub { margin-bottom: 24px; }
  .wiz-result {
    display: grid; grid-template-columns: 44px 1fr auto; gap: 14px;
    padding: 18px 18px; border-radius: 14px; background: var(--cream);
    margin-bottom: 12px; align-items: start;
    border: 1px solid var(--cream-2);
  }
  .wiz-result.rank-1 { background: linear-gradient(135deg, rgba(152,175,36,.14), rgba(152,175,36,.04)); border-color: var(--cg-olive); }
  .wiz-result.rank-2 { background: linear-gradient(135deg, rgba(12,128,110,.08), rgba(12,128,110,.02)); border-color: rgba(12,128,110,.3); }
  .wiz-result.rank-3 { background: linear-gradient(135deg, rgba(107,127,181,.08), rgba(107,127,181,.02)); border-color: rgba(107,127,181,.3); }
  .wiz-rank {
    width: 44px; height: 44px; border-radius: 12px;
    background: white; display: flex; align-items: center; justify-content: center;
    font-size: 20px; font-weight: 800; color: var(--cg-olive-deep);
  }
  .wiz-result.rank-2 .wiz-rank { color: var(--pretto-green); }
  .wiz-result.rank-3 .wiz-rank { color: var(--recrut); }
  .wiz-result-body h3 { margin: 0 0 4px; font-size: 17px; font-weight: 700; }
  .wiz-result-body .next { font-size: 13px; color: var(--ink-soft); margin-bottom: 8px; }
  .wiz-result-body .next::before { content: "→ "; color: var(--cg-olive); font-weight: 700; }
  .wiz-reasons { list-style: none; padding: 0; margin: 0; }
  .wiz-reasons li { font-size: 12px; color: var(--ink-soft); padding-left: 14px; position: relative; line-height: 1.5; }
  .wiz-reasons li::before { content: "•"; color: var(--cg-olive); position: absolute; left: 0; font-weight: 700; }
  .wiz-score { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .8px; font-weight: 600; white-space: nowrap; }

  @media (max-width: 900px) {
    .axes { grid-template-columns: 1fr; }
    .stats { grid-template-columns: repeat(2, 1fr); }
    header.page { padding: 20px 22px; }
    main { padding: 18px 22px 40px; }
    .axis-head { padding: 20px 18px; gap: 14px; }
    .axis-icon { width: 56px; height: 56px; font-size: 28px; }
    .axis-info h2 { font-size: 20px; }
    .axis-body-inner { padding: 6px 18px 22px; }
    .wiz-card { padding: 24px 22px; }
    .wiz-question { font-size: 19px; }
  }
</style>
</head>

function statusTag(p) {
  if (p.status === 'zombie') return { cls: 'zombie', label: 'zombie' };
  if (p.status === 'done')   return { cls: 'done',   label: 'terminé' };
  if (p.status === 'blocked')return { cls: 'blocked',label: 'bloqué' };
  return null;
}

function renderStats() {
  const all = PROJECTS;
  const wip = all.filter(p => p.status === 'wip').length;
  const zombies = all.filter(p => p.status === 'zombie' || p.axis === 'decide').length;
  const hot = all.filter(p => (p.tags || []).includes('HOT')).length;
  const avg = Math.round(all.reduce((s, p) => s + p.progress, 0) / all.length);
  const finished = all.filter(p => p.progress >= 100).length;

  $('#stats').innerHTML = `
    <div class="stat"><div class="label">Projets total</div><div class="value">${all.length}</div><div class="sub">sur 4 axes + décision</div></div>
    <div class="stat" style="border-left-color: var(--cg-olive-deep)"><div class="label">En cours</div><div class="value">${wip}</div><div class="sub">activement travaillés</div></div>
    <div class="stat" style="border-left-color: var(--warn)"><div class="label">Hot</div><div class="value">${hot}</div><div class="sub">priorité immédiate</div></div>
    <div class="stat" style="border-left-color: var(--danger)"><div class="label">À trancher</div><div class="value">${zombies}</div><div class="sub">zombies / à décider</div></div>
    <div class="stat" style="border-left-color: var(--pretto-green)"><div class="label">Avancement moyen</div><div class="value">${avg}%</div><div class="sub">${finished} terminés</div></div>
  `;
}

function projectCard(p) {
  const st = statusTag(p);
  const tags = [
    ...(st ? [`<span class="tag ${st.cls}">${st.label}</span>`] : []),
    ...(p.tags || []).map(t => {
      if (t === 'HOT') return `<span class="tag hot">hot</span>`;
      if (t === 'ZOMBIE') return `<span class="tag zombie">zombie</span>`;
      return `<span class="tag">${t}</span>`;
    }),
  ].join('');
  return `
    <div class="project" data-id="${p.id}">
      <div class="name">${p.name}</div>
      <div class="pct">${p.progress}%</div>
      <div class="next">${p.next}</div>
      <div class="bar"><span style="width:${p.progress}%"></span></div>
      ${tags ? `<div class="tags">${tags}</div>` : ''}
    </div>`;
}

function sortProjects(list) {
  const sorted = [...list];
  if (state.sort === 'priority')           sorted.sort((a,b) => a.priority - b.priority || b.progress - a.progress);
  else if (state.sort === 'progress-desc') sorted.sort((a,b) => b.progress - a.progress);
  else if (state.sort === 'progress-asc')  sorted.sort((a,b) => a.progress - b.progress);
  else if (state.sort === 'name')          sorted.sort((a,b) => a.name.localeCompare(b.name, 'fr'));
  return sorted;
}

function axisProjects(axisKey) {
  const q = state.search.toLowerCase().trim();
  return PROJECTS.filter(p => {
    if (p.axis !== axisKey) return false;
    if (state.hideZombies && (p.status === 'zombie' || p.axis === 'decide')) return false;
    if (!q) return true;
    return [p.name, p.description, p.next, ...(p.tags||[])].join(' ').toLowerCase().includes(q);
  });
}

function renderAxis(axisKey) {
  const meta = AXES[axisKey];
  const items = axisProjects(axisKey);
  const sorted = sortProjects(items);
  const avg = items.length ? Math.round(items.reduce((s,p) => s + p.progress, 0) / items.length) : 0;
  const hot = items.filter(p => (p.tags||[]).includes('HOT')).length;
  const isOpen = state.openAxis === axisKey;

  const inner = items.length
    ? sorted.map(projectCard).join('')
    : '<div style="color:var(--muted);font-size:13px;padding:8px 4px">Aucun projet ici.</div>';

  return `
    <section class="axis ${axisKey} ${isOpen ? 'open' : ''}" data-axis="${axisKey}">
      <div class="axis-head">
        <div class="axis-icon">${meta.icon}</div>
        <div class="axis-info">
          <h2>${meta.title}</h2>
          <div class="sub">${meta.sub}</div>
          <div class="axis-stats">
            <div class="axis-stat"><strong>${items.length}</strong>projets</div>
            <div class="axis-stat"><strong>${hot}</strong>hot</div>
            <div class="axis-stat" style="flex:1;display:flex;align-items:center;gap:10px">
              <strong style="display:inline-block;margin-right:8px">${avg}%</strong>
              <div class="axis-progress"><span style="width:${avg}%"></span></div>
            </div>
          </div>
        </div>
        <div class="chevron">▾</div>
      </div>
      <div class="axis-body">
        <div class="axis-body-inner">
          <div class="projects">${inner}</div>
        </div>
      </div>
    </section>`;
}

function renderAxes() {
  const order = ['rd', 'ventes', 'marketing', 'recrutement', 'decide'];
  let html = order
    .filter(a => !(state.hideZombies && a === 'decide'))
    .map(renderAxis).join('');
  $('#axes').innerHTML = html;

  $$('.axis').forEach(el => {
    el.querySelector('.axis-head').addEventListener('click', () => {
      const key = el.dataset.axis;
      state.openAxis = state.openAxis === key ? null : key;
      renderAxes();
      if (state.openAxis === key) {
        const opened = document.querySelector(`.axis[data-axis="${key}"]`);
        if (opened) opened.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    });
  });
  $$('.project').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      openModal(el.dataset.id);
    });
  });
}

function openModal(id) {
  const p = PROJECTS.find(x => x.id === id);
  if (!p) return;
  const meta = AXES[p.axis];
  const memLink = p.memory ? `<a href="../${p.memory}">${p.memory}</a>` : '<span style="color:var(--muted)">—</span>';
  $('#modal').innerHTML = `
    <button class="close" id="closeModal">×</button>

    <h3>${p.name}</h3>
    <div class="row"><div class="key">Avancement</div><div class="val"><div style="height:8px;background:var(--cream-2);border-radius:4px;overflow:hidden;margin-bottom:6px"><span style="display:block;height:100%;width:${p.progress}%;background:var(--cg-olive);border-radius:4px"></span></div><strong>${p.progress}%</strong></div></div>
    <div class="row"><div class="key">Prochaine action</div><div class="val">${p.next}</div></div>
    <div class="row"><div class="key">Description</div><div class="val">${p.description}</div></div>
    <div class="row"><div class="key">Statut</div><div class="val">${p.status}</div></div>
    <div class="row"><div class="key">Priorité</div><div class="val">${'★'.repeat(6 - p.priority)}${'☆'.repeat(p.priority - 1)} (${p.priority}/5)</div></div>
    <div class="row"><div class="key">Mémoire liée</div><div class="val">${memLink}</div></div>
    <div class="row"><div class="key">Tags</div><div class="val">${(p.tags||[]).join(', ') || '—'}</div></div>

  $('#overlay').classList.add('open');

function closeModal() { $('#overlay').classList.remove('open'); }

$('#overlay').addEventListener('click', e => { if (e.target.id === 'overlay') closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

/* Facets dérivées de chaque projet (déduites des attributs existants).
   Utilisées pour scorer en fonction des réponses du wizard. */
function facets(p) {
  const tags = (p.tags || []).map(t => t.toLowerCase());
  const name = (p.name || '').toLowerCase();
  const next = (p.next || '').toLowerCase();
  const desc = (p.description || '').toLowerCase();

  // Effort estimé pour atteindre une étape concrète
  const effort = p.status === 'idea' ? 'L'
               : p.progress >= 75    ? 'S'
               : p.progress >= 35    ? 'M' : 'L';

  // Énergie requise pour s'y mettre
  const energy = p.status === 'idea' ? 'high'
               : p.progress >= 70    ? 'low' : 'med';

  // Mood : ce qu'on cherche à faire
  const moods = [];
  if (p.status === 'idea')                                            moods.push('start');
  if (p.status === 'wip' && p.progress >= 50)                         moods.push('finish');
  if (['ventes','marketing'].includes(p.axis) && tags.includes('hot')) moods.push('sell');
  if (p.axis === 'recrutement')                                       moods.push('structure');
  if (p.axis === 'ventes' || p.axis === 'marketing')                  moods.push('sell');
  if (p.axis === 'rd' && p.progress < 30)                             moods.push('build');

  // Horizon
  const horizon = (['ventes','marketing'].includes(p.axis) && (tags.includes('hot') || p.progress >= 50))
                  ? 'short'
                  : (p.priority >= 3 && p.progress < 30) ? 'long' : 'mid';

  // Pression à laquelle ça répond
  const pressures = [];
  if (tags.includes('hot') && ['ventes','marketing'].includes(p.axis)) pressures.push('cash');
  if (name.includes('100k') || name.includes('pack') || desc.includes('pack 100k') || desc.includes('pilote')) pressures.push('pack');
  if (tags.includes('macles')) pressures.push('macles');
  if (p.axis === 'rd' && !name.includes('100k') && !name.includes('pack')) pressures.push('tools');
  if (p.axis === 'recrutement') pressures.push('team');

  // Quick win : avancé, faible effort, démontrable
  const quickWin = p.progress >= 70 && effort === 'S';
  // Showable : on peut montrer un truc à la fin de la session
  const showable = p.progress >= 70 || (p.status === 'wip' && p.progress >= 50 && effort !== 'L');
  // Stuck : demande une décision pour avancer
  const stuck = /^(décision|décider|choisir|définir|trancher)/i.test(p.next || '');
  // À risque d'enlisement
  const risk = tags.includes('risque enlisement') || (p.status === 'wip' && p.progress < 30);

  return { effort, energy, moods, horizon, pressures, quickWin, showable, stuck, risk, tags };
}

        label: "Faire rentrer du cash / vendre",
        score: (p, f) => (f.moods.includes('sell') ? 30 : 0) + (f.pressures.includes('cash') ? 15 : 0),
      },
      {
        label: "Structurer l'équipe / déléguer",
        score: (p, f) => (f.moods.includes('structure') ? 30 : 0),
      },
    ],
  },
  {
    id: 'pressure',
    text: "Ce qui te pèse le plus en arrière-plan, c'est quoi ?",
    sub: "Ton intuition compte plus que ta to-do.",
    options: [
      {
        label: "Du cash, maintenant",
        score: (p, f) => (f.pressures.includes('cash') ? 30 : 0) + (f.horizon === 'short' ? 10 : 0),
      },
      {
        label: "Le Pack 100K doit avancer",
        score: (p, f) => (f.pressures.includes('pack') ? 30 : 0),
      },
      {
        label: "Macles / les 80 agents",
        score: (p, f) => (f.pressures.includes('macles') ? 35 : 0),
      },
      {
        label: "Mes outils internes / R&D",
        score: (p, f) => (f.pressures.includes('tools') ? 25 : 0) + (p.axis === 'rd' ? 5 : 0),
      },
    ],
  },
  {
    id: 'outcome',
    text: "À la fin de la session, t'aimerais quoi exactement ?",
    sub: "L'effet psychologique compte autant que le résultat.",
    options: [
      {
        label: "Un truc à montrer ce soir",
        score: (p, f) => (f.showable ? 25 : 0) + (f.quickWin ? 15 : 0),
      },
      {
        label: "Un step propre sur un truc important",
        score: (p, f) => (p.priority === 1 ? 20 : p.priority === 2 ? 10 : 0) + (p.status === 'wip' ? 10 : 0),
      },
      {
        label: "Casser un blocage, sortir d'une impasse",
        score: (p, f) => (f.stuck ? 35 : 0) + (f.risk ? 10 : 0),
      },
    ],
  },
];

/* Pourquoi ce projet sort en tête ? — génère 2-3 raisons humaines */
function reasons(p, f, answers) {
  const r = [];
  if (p.priority === 1) r.push("Priorité 1 dans ta carte");
  if ((p.tags||[]).includes('HOT')) r.push("Taggé HOT");
  if (f.quickWin) r.push(`Quick win : ${p.progress}% déjà fait, effort faible`);
  if (f.stuck) r.push("Demande juste une décision pour débloquer");
  if (f.risk) r.push("Risque d'enlisement — bon moment pour le débloquer");
  if (f.pressures.includes('cash') && answers.find(a => a && a.label && a.label.toLowerCase().includes('cash'))) r.push("Aligné avec ta pression cash");
  if (f.pressures.includes('pack') && answers.find(a => a && a.label && a.label.toLowerCase().includes('pack 100k'))) r.push("Pousse le Pack 100K");
  if (f.pressures.includes('macles') && answers.find(a => a && a.label && a.label.toLowerCase().includes('macles'))) r.push("Avance le canal Macles");
  if (f.showable && answers.find(a => a && a.label && a.label.toLowerCase().includes('montrer'))) r.push("Tu peux le montrer ce soir");
  if (p.progress >= 75 && p.progress < 100) r.push(`Bientôt fini (${p.progress}%)`);
  if (p.status === 'idea' && f.moods.includes('start')) r.push("Frais à démarrer carré");
  if (p.axis === 'recrutement' && answers.find(a => a && a.label && a.label.toLowerCase().includes("structurer"))) r.push("Renforce l'équipe");
  // Dédup et limite à 3
  return [...new Set(r)].slice(0, 3);
}

/* ===== State + render ===== */
let wizState = { step: 0, answers: [] };

function wizReset() {
  wizState = { step: 0, answers: [] };
  renderWizard();
}

function renderWizard() {
  const card = $('#wizCard');
  const total = QUESTIONS.length;
  if (wizState.step < total) {
    const q = QUESTIONS[wizState.step];
    const selected = wizState.answers[wizState.step];
    const pct = Math.round((wizState.step / total) * 100);
    card.innerHTML = `
      <div class="wiz-head">
        <div class="wiz-step">Question ${wizState.step + 1} / ${total}</div>
        <button class="wiz-close" id="wizClose" title="Fermer">×</button>
      </div>
      <div class="wiz-progress"><span style="width:${pct}%"></span></div>
      <div class="wiz-question">${q.text}</div>
      <div class="wiz-sub">${q.sub}</div>
      <div class="wiz-options" id="wizOptions">
        ${q.options.map((o, i) => `
          <button class="wiz-option ${selected && selected.idx === i ? 'selected' : ''}" data-idx="${i}">${o.label}</button>
        `).join('')}
      </div>
      <div class="wiz-nav">
        <button class="wiz-btn ghost" id="wizPrev" ${wizState.step === 0 ? 'disabled' : ''}>← Précédent</button>
        <button class="wiz-btn" id="wizNext" ${selected ? '' : 'disabled'}>${wizState.step === total - 1 ? 'Voir la suggestion →' : 'Suivant →'}</button>
      </div>
    `;
    $$('.wiz-option').forEach(el => el.addEventListener('click', () => {
      const idx = +el.dataset.idx;
      wizState.answers[wizState.step] = { idx, label: q.options[idx].label, score: q.options[idx].score };
      renderWizard();
    }));
    $('#wizClose').addEventListener('click', closeWizard);
    $('#wizPrev').addEventListener('click', () => { if (wizState.step > 0) { wizState.step--; renderWizard(); }});
    $('#wizNext').addEventListener('click', () => { if (wizState.answers[wizState.step]) { wizState.step++; renderWizard(); }});
  } else {
    // Résultats
    const candidates = PROJECTS.filter(p =>
      p.axis !== 'decide' &&
      p.status !== 'zombie' &&
      p.status !== 'blocked' &&
      p.progress < 100 &&
      !(p.tags || []).map(t => t.toLowerCase()).includes('bloqué')
    );
    const scored = candidates.map(p => {
      const f = facets(p);
      let s = 50;
      s += (4 - p.priority) * 6; // priority weight
      if ((p.tags || []).includes('HOT')) s += 12;
      for (const a of wizState.answers) {
        if (a && typeof a.score === 'function') s += a.score(p, f);
      }
      return { p, f, s, reasons: reasons(p, f, wizState.answers) };
    }).sort((a, b) => b.s - a.s);

    const top = scored.slice(0, 3);
    const maxScore = Math.max(...scored.map(x => x.s), 1);

    card.innerHTML = `
      <div class="wiz-head">
        <div class="wiz-step">Suggestion</div>
        <button class="wiz-close" id="wizClose" title="Fermer">×</button>
      </div>
      <div class="wiz-results">
        <h2>Voilà par quoi je commencerais.</h2>
        <div class="wiz-sub">Top 3 calculé sur ta réponse. Click sur un projet pour ouvrir le détail.</div>
        ${top.map((t, i) => `
          <div class="wiz-result rank-${i+1}" data-id="${t.p.id}">
            <div class="wiz-rank">${i + 1}</div>
            <div class="wiz-result-body">
              <h3>${t.p.name}</h3>
              <div class="next">${t.p.next}</div>
              <ul class="wiz-reasons">
                ${t.reasons.length ? t.reasons.map(r => `<li>${r}</li>`).join('') : '<li>Match général avec tes réponses</li>'}
              </ul>
            </div>
            <div class="wiz-score">Score<br/>${Math.round(t.s / maxScore * 100)}</div>
          </div>
        `).join('')}
      </div>
      <div class="wiz-nav">
        <button class="wiz-btn ghost" id="wizRestart">↻ Refaire</button>
        <button class="wiz-btn" id="wizClose2">OK, j'y vais</button>
      </div>
    `;
    $('#wizClose').addEventListener('click', closeWizard);
    $('#wizClose2').addEventListener('click', closeWizard);
    $('#wizRestart').addEventListener('click', wizReset);
    $$('.wiz-result').forEach(el => el.addEventListener('click', () => {
      closeWizard();
      openModal(el.dataset.id);
    }));
  }
}

function openWizard() { wizReset(); $('#wizOverlay').classList.add('open'); }
function closeWizard() { $('#wizOverlay').classList.remove('open'); }

$('#openWizard').addEventListener('click', openWizard);
$('#wizOverlay').addEventListener('click', e => { if (e.target.id === 'wizOverlay') closeWizard(); });
</script>
